    <h1>[日本語] OpenDRIVE 幾何プリミティブ</h1>
    <p>ASAM OpenDRIVEは、参照線に付随する数学的プリミティブを用いて道路幾何を定義します。</p>
    <h2>主要プリミティブ</h2>
    <ul>
        <li><strong>Line</strong>: 長さで定義される直線。</li>
        <li><strong>Arc</strong>: 一定の曲率を持つ円弧。</li>
        <li><strong>Spiral</strong>: 曲率変化による滑らかな接続。</li>
        <li><strong>Poly3</strong>: 3次多項式による定義。</li>
    </ul>
